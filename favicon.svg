<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#0a0a0a"/>
  <!-- Clock body -->
  <circle cx="16" cy="17" r="10" fill="none" stroke="#4f9eff" stroke-width="2.2"/>
  <!-- Crown/stem -->
  <line x1="16" y1="7" x2="16" y2="5" stroke="#4f9eff" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Crown buttons -->
  <line x1="21" y1="8.5" x2="22.5" y2="7" stroke="#4f9eff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="11" y1="8.5" x2="9.5" y2="7" stroke="#4f9eff" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Minute hand (pointing up) -->
  <line x1="16" y1="17" x2="16" y2="11.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Hour hand (pointing right) -->
  <line x1="16" y1="17" x2="20" y2="17" stroke="#4f9eff" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="17" r="1.5" fill="white"/>
</svg>